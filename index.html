<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Zametki </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1><span id="popa-Z">Z</span>ame<span id="secret-trigger">t</span>ki</h1>
<audio id="popa-Audio" preload="auto"><source src="anthem.mp3" type="audio/mpeg"></audio>
        <button class="btn-primary" onclick="openModal()">+ Новая заметка</button>
        
        <div class="filter-panel">
            <div class="filter-group filter-group-grow">
                <label class="filter-label">🔍 Поиск:</label>
                <input 
                    type="text" 
                    id="textSearch" 
                    class="filter-input" 
                    placeholder="Поиск по названию или тексту..."
                    oninput="applyFiltersDebounced()"
                >
            </div>

            <div class="filter-group">
                <label class="filter-label">🏷️ Тег:</label>
                <select id="tagFilter" class="filter-select" onchange="applyFilters()">
                    <option value="">Все теги</option>
                </select>
            </div>
            
            <div class="filter-group">
                <label class="filter-label">📊 Сортировка:</label>
                <select id="sortOption" class="filter-select" onchange="applyFilters()">
                    <option value="date-desc">📅 По дате (новые)</option>
                    <option value="date-asc">📅 По дате (старые)</option>
                    <option value="priority-desc">⭐ По приоритету (высокий)</option>
                    <option value="priority-asc">⭐ По приоритету (низкий)</option>
                </select>
            </div>
        </div>
        
        <div class="notes-grid" id="notesGrid"></div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOnOverlay(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header" id="modalHeader">Создание заметки</div>
            <div class="modal-body">
                <div class="mode-toggle">
                    <button class="mode-btn active" onclick="setMode('text')" id="textMode">Текст</button>
                    <button class="mode-btn" onclick="setMode('list')" id="listMode">Список</button>
                </div>
                
                <div class="form-group">
                    <div class="label-with-counter">
                        <label class="form-label">Название</label>
                        <span class="char-counter" id="titleCounter">0/100</span>
                    </div>
                    <input type="text" class="form-input" id="noteTitle" 
                        placeholder="Введите название заметки"
                        maxlength="100" 
                        oninput="updateCharCounter('noteTitle', 'titleCounter', 100)">
                </div>

                <div class="form-group">
                    <label class="form-label">Приоритет</label>
                    <select id="notePriority" class="form-select">
                        <option value="low">🟢 Низкий</option>
                        <option value="medium" selected>🟡 Средний</option>
                        <option value="high">🔴 Высокий</option>
                    </select>
                </div>

                <div class="form-group form-group-relative">
                    <div class="label-with-counter">
                        <label class="form-label">Теги (через запятую)</label>
                        <span class="char-counter" id="tagsCounter">0/150</span>
                    </div>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="noteTags" 
                        placeholder="работа, срочно, идея"
                        maxlength="150"
                        oninput="onTagsInput(); updateCharCounter('noteTags', 'tagsCounter', 150)"
                        onfocus="showTagSuggestions()"
                    >
                    <div class="tag-suggestions" id="tagSuggestions"></div>
                </div>

                <div class="form-group">
                    <div class="label-with-counter">
                        <label class="form-label" id="contentLabel">Содержание</label>
                        <span class="char-counter" id="contentCounter">0/2000</span>
                    </div>
                    <textarea class="form-textarea" id="noteContent" 
                            placeholder="Введите текст заметки..."
                            maxlength="2000" 
                            oninput="updateCharCounter('noteContent', 'contentCounter', 2000)"></textarea>
                </div>

                <div class="color-pickers">
                    <div class="color-group">
                        <label class="color-label">Фон</label>
                        <input type="color" id="noteColor" value="#ffffff">
                    </div>
                    <div class="color-group">
                        <label class="color-label">Закрепление</label>
                        <input type="color" id="pinColor" value="#e1f5fe">
                    </div>
                    <div class="color-group">
                        <label class="color-label">Текст</label>
                        <input type="color" id="textColor" value="#5a6c7d">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn btn-save" onclick="saveNote()">Создать</button>
            </div>
        </div>
    </div>

<!-- СЕКРЕТНАЯ МОДАЛКА -->
<div id="secretModal" class="modal-overlay">
    <div class="modal secret-modal">
        <div class="modal-header" style="background: #2c3e50;">🔐 Секретный архив</div>
        <div class="modal-body">
            
            <!-- Экран 1: Ввод пароля -->
            <div id="secret-login-screen">
                <p style="text-align: center; margin-bottom: 15px; color: #666;">Введите секретный код доступа:</p>
                <input type="password" id="secret-password-input" class="form-input" placeholder="Пароль" style="margin-bottom: 10px;">
                <p id="secret-error" style="color: #d32f2f; display: none; font-size: 13px; text-align: center; font-weight: bold;"></p>
                <button class="btn btn-save" style="width: 100%;" onclick="checkSecretPassword()">Войти</button>
                <button class="btn btn-cancel" style="width: 100%; margin-top: 10px;" onclick="closeSecretModal()">Отмена</button>
            </div>

            <!-- Экран 2: Создание пароля (первый вход) -->
            <div id="secret-setup-screen" style="display: none;">
                <p style="text-align: center; margin-bottom: 15px; color: #666;">Секретный архив пуст. Придумайте пароль:</p>
                <input type="password" id="secret-new-password" class="form-input" placeholder="Новый пароль" style="margin-bottom: 10px;">
                <button class="btn btn-save" style="width: 100%;" onclick="setSecretPassword()">Создать пароль</button>
            </div>

            <!-- Экран 3: Список секретных заметок -->
            <div id="secret-content-screen" style="display: none;">
                <div style="text-align: center; color: #666; margin-bottom: 20px;">🔒 Секретный архив защищён паролем</div>
                
                <!-- КНОПКА СОЗДАНИЯ  -->
                <button class="btn btn-save" style="width: 100%; margin-bottom: 15px;" onclick="openSecretNoteForm()">
                    + Добавить секретную заметку
                </button>

                <!-- Форма создания (скрыта по умолчанию) -->
                <div id="secret-note-form" style="display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                    <input type="text" id="secret-note-title" class="form-input" placeholder="Название" style="margin-bottom: 10px;">
                    <textarea id="secret-note-content" class="form-textarea" placeholder="Секретный текст..." style="margin-bottom: 10px; min-height: 80px;"></textarea>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-save" style="flex: 1;" onclick="saveSecretNote()">Сохранить</button>
                        <button class="btn btn-cancel" style="flex: 1;" onclick="closeSecretNoteForm()">Отмена</button>
                    </div>
                </div>

                <!-- Список заметок -->
                <div id="secret-notes-list"></div> 
                
                <button class="btn btn-cancel" style="width: 100%; margin-top: 15px;" onclick="closeSecretModal()">Закрыть архив</button>
            </div>
        </div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
